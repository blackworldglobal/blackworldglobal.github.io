 <!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black World Global | Official Store</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #050505; color: #fff; text-align: center; margin: 0; padding: 10px; padding-bottom: 80px; }
        .container { max-width: 900px; margin: auto; padding: 10px; }
        h1 { color: #00ff88; text-transform: uppercase; letter-spacing: 3px; margin-top: 40px; font-size: 2.2rem; margin-bottom: 5px; }
        .tagline { font-style: italic; color: #888; margin-bottom: 30px; }
        
        /* СЕКЦИЯ КАУЗА */
        .mission-box { background: rgba(0, 255, 136, 0.03); border: 1px dashed #333; padding: 25px; border-radius: 20px; margin: 30px 0; text-align: center; }
        .comparison { display: flex; gap: 15px; margin-top: 20px; }
        .comp-item { flex: 1; text-align: center; }
        .comp-item img { width: 100%; border-radius: 12px; border: 2px solid #333; height: 200px; object-fit: cover; transition: 0.3s; }
        .before { border-color: #ff4444 !important; }
        .after { border-color: #00ff88 !important; }

        /* КАРТА ЗА ПОРЪЧКА */
        .order-card { background: #111; border: 2px solid #00ff88; border-radius: 25px; padding: 25px; margin: 40px 0; text-align: left; }
        .price-tag { text-align: center; margin-bottom: 20px; }
        .price-main { font-size: 2.5rem; font-weight: bold; color: #fff; display: block; }
        .price-sub { color: #00ff88; font-weight: bold; letter-spacing: 1px; }

        .product-images { display: flex; gap: 15px; margin: 20px 0; justify-content: center; }
        .product-images img { width: 48%; border-radius: 10px; border: 1px solid #333; height: 200px; object-fit: cover; }
        
        input, select, textarea { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #333; border-radius: 10px; background: #1a1a1a; color: #fff; box-sizing: border-box; }
        input:focus { border-color: #00ff88; outline: none; }

        .order-btn { width: 100%; background: #00ff88; color: #000; padding: 20px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 1.1rem; transition: 0.3s; }
        .order-btn:hover { background: #00cc6e; transform: translateY(-2px); }
        .order-btn:disabled { background: #444; color: #888; }
        
        /* КОНТАКТИ */
        .contact-box { background: #111; padding: 25px; border-radius: 20px; border: 1px solid #333; margin: 20px 0; text-align: left; }
        .contact-item { display: flex; align-items: center; margin: 12px 0; color: #ddd; text-decoration: none; font-size: 1.1rem; }
        .contact-item span { color: #00ff88; margin-right: 15px; font-size: 1.3rem; }

        /* ПЛАВАЩИ БУТОНИ */
        .floating-chat { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 12px; z-index: 1000; }
        .chat-btn { width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; text-decoration: none; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.5); transition: 0.3s; font-size: 0.9rem;}
        .whatsapp { background: #25D366; }
        .viber { background: #7360f2; }
        .chat-btn:hover { transform: scale(1.1); }

        .bank-info { background: #111; padding: 25px; border-radius: 20px; border: 1px solid #333; margin-top: 40px; text-align: left; }
    </style>
</head>
<body>

    <div class="floating-chat">
        <a href="https://wa.me/359884166258" class="chat-btn whatsapp" target="_blank">WA</a>
        <a href="viber://chat?number=%2B359884166258" class="chat-btn viber">Viber</a>
    </div>

    <div class="container">
        <h1>Black World Global</h1>
        <p class="tagline">Това ли сме ние?</p>

        <div class="mission-box">
            <h2 style="color: #00ff88; margin-top: 0;">НАШАТА КАУЗА</h2>
            <p style="color: #ccc;">Всяка поръчка директно финансира нашите акции по почистване на природата.</p>
            <div class="comparison">
                <div class="comp-item">
                    <img src="Picsart_26-03-19_09-57-34-925.jpg" alt="Преди" class="before">
                    <p style="color: #ff4444; font-weight: bold; margin-top: 8px;">ПРЕДИ</p>
                </div>
                <div class="comp-item">
                    <img src="file_0000000074e47243a9d814cf1ef6a2a3~2.png" alt="След" class="after">
                    <p style="color: #00ff88; font-weight: bold; margin-top: 8px;">СЛЕД</p>
                </div>
            </div>
        </div>

        <div class="order-card" id="shop">
            <div class="price-tag">
                <span class="price-main">24.99€</span>
                <span class="price-sub">+ ПОДАРЪК КЪМ ВСЯКА ПОРЪЧКА 🎁</span>
            </div>

            <div class="product-images">
                <img src="1774862857379~3.png" alt="Лице">
                <img src="1774862857379~2.png" alt="Гръб">
            </div>

            <form id="orderForm" action="https://formspree.io/f/mojpdenk" method="POST">
                <input type="text" name="Име" placeholder="Име и Фамилия" required>
                <input type="tel" name="Телефон" placeholder="Телефон за потвърждение" required>
                <select name="Размер" required>
                    <option value="" disabled selected>Избери размер</option>
                    <option value="S">S</option><option value="M">M</option><option value="L">L</option><option value="XL">XL</option><option value="XXL">XXL</option>
                </select>
                <textarea name="Адрес" placeholder="Град и Офис на Еконт/Спиди" required style="height: 100px;"></textarea>
                <button type="submit" id="submitBtn" class="order-btn">Поръчай сега 🌍</button>
            </form>
        </div>

        <div class="contact-box">
            <h3 style="color: #00ff88; margin-top: 0;">Контакти</h3>
            <a href="tel:+359884166258" class="contact-item"><span>📞</span> 0884 166 258</a>
            <a href="mailto:blackworld.global@gmail.com" class="contact-item"><span>✉️</span> blackworld.global@gmail.com</a>
        </div>

        <div class="bank-info">
            <h2 style="color: #00ff88;">Подкрепете ни</h2>
            <div style="background: #1a1a1a; padding: 20px; border-radius: 12px; border-left: 5px solid #00ff88;">
                <p id="ibanText" style="margin: 0; font-family: monospace; font-size: 1.1rem; font-weight: bold;">BG16IORT80481095239201</p>
                <button onclick="copyIBAN()" id="copyBtn" style="background: #333; color: #00ff88; border: 1px solid #00ff88; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin-top: 15px;">Копирай IBAN</button>
            </div>
        </div>
    </div>

<script>
// Функция за копиране на IBAN
function copyIBAN() {
    const iban = "BG16IORT80481095239201";
    navigator.clipboard.writeText(iban).then(() => {
        const btn = document.getElementById('copyBtn');
        btn.innerHTML = "Копирано!";
        setTimeout(() => { btn.innerHTML = "Копирай IBAN"; }, 2000);
    });
}

// Изпращане на формата
const form = document.getElementById("orderForm");
form.onsubmit = async (e) => {
    e.preventDefault();
    const btn = document.getElementById("submitBtn");
    btn.innerHTML = "Изпращане...";
    btn.disabled = true;
    const formData = new FormData(form);
    const response = await fetch(form.action, {
        method: "POST",
        body: formData,
        headers: { 'Accept': 'application/json' }
    });
    if (response.ok) {
        window.location.replace("https://blackworldglobal.github.io/thanks.html");
    } else {
        alert("Грешка при изпращането. Моля, свържете се с нас.");
        btn.innerHTML = "Грешка!";
        btn.disabled = false;
    }
};
</script>
</body>
</html>
